# @package _global_
# Large network architecture for week 4 level 1
env:
  name: CartPole-v1

seed: 0

agent:
  buffer_capacity:    10000
  batch_size:         32
  learning_rate:      0.001
  gamma:              0.99
  epsilon_start:      1.0
  epsilon_final:      0.01
  epsilon_decay:      500
  target_update_freq: 1000
  hidden_sizes: [128, 128, 128]

train:
  num_frames:     20000
  eval_interval:  1000
